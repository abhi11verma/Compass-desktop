<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- filled background circle so it reads on any browser chrome -->
  <circle cx="16" cy="16" r="16" fill="#0E0E11"/>
  <!-- ring -->
  <circle cx="16" cy="16" r="12.5" stroke="white" stroke-width="0.9"/>
  <!-- cardinal ticks -->
  <line x1="16" y1="3.5" x2="16" y2="5.5" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="16" y1="26.5" x2="16" y2="28.5" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
  <line x1="3.5" y1="16" x2="5.5" y2="16" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
  <line x1="26.5" y1="16" x2="28.5" y2="16" stroke="white" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
  <!-- needle north (solid) -->
  <polygon points="16,4 13.4,16 16,14.2 18.6,16" fill="white"/>
  <!-- needle south (ghost) -->
  <polygon points="16,28 13.4,16 16,17.8 18.6,16" fill="white" opacity="0.22"/>
  <!-- center pivot -->
  <circle cx="16" cy="16" r="1.2" fill="white"/>
</svg>
